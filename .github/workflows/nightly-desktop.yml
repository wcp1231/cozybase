name: Nightly Desktop

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-desktop-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.3
  NIGHTLY_TAG: nightly
  NIGHTLY_TITLE: CozyBase Nightly
  NIGHTLY_ASSET: CozyBase_nightly_aarch64.dmg

jobs:
  build-nightly-dmg:
    name: Build Nightly DMG
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri -> target

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build nightly desktop bundle
        run: bun run desktop:build

      - name: Normalize nightly DMG asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          shopt -s nullglob
          dmg_files=(packages/desktop/src-tauri/target/release/bundle/dmg/*.dmg)

          if [ "${#dmg_files[@]}" -ne 1 ]; then
            echo "Expected exactly one DMG bundle, found ${#dmg_files[@]}."
            printf '%s\n' "${dmg_files[@]}"
            exit 1
          fi

          cp "${dmg_files[0]}" "dist/${NIGHTLY_ASSET}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cozybase-nightly-dmg-aarch64
          path: dist/${{ env.NIGHTLY_ASSET }}
          if-no-files-found: error

      - name: Publish nightly release
        env:
          GH_TOKEN: ${{ github.token }}
          DMG_PATH: dist/${{ env.NIGHTLY_ASSET }}
        run: bash .github/scripts/publish-nightly.sh
