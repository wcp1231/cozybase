columns:
  - name: id
    type: text
    primary_key: true
  - name: title
    type: text
    required: true
  - name: content
    type: text
  - name: published
    type: integer
    default: "0"
  - name: created_at
    type: text
    default: "(datetime('now'))"

indexes:
  - columns: [published, created_at]
